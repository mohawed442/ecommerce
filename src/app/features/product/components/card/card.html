<div
    class="max-w-sm rounded-lg overflow-hidden shadow-sm bg-white p-3 group hover:shadow-lg transition-all duration-300 border border-transparent hover:border-green-500 relative flex flex-col justify-between">
    <div [routerLink]="['/product-details', product._id]">
        <div class="relative overflow-hidden mb-3">
            <img class="w-full object-contain h-48 group-hover:scale-105 transition-transform duration-500"
                [src]='product.imageCover' alt="Laptop">
        </div>
        <div class="space-y-1">
            <span class="text-green-600 text-xs font-medium uppercase">{{product.category.name}}</span>
            <h3 class="text-sm font-bold text-gray-800 h-10 line-clamp-2">{{product.title}}</h3>
            <div class="flex justify-between items-center pt-2">
                <span class="text-sm font-bold text-gray-900">{{product.price}} EGP</span>
                <div class="flex items-center space-x-1">
                    <i class="fas fa-star text-rating text-xs"></i>
                    <span class="text-gray-500 text-xs">{{product.ratingsAverage}}</span>
                </div>
            </div>
        </div>
    </div>
    <button
        class="cursor-pointer w-full mt-4 bg-main text-white py-2 rounded-md text-sm opacity-0 translate-y-full duration-700  group-hover:opacity-100 group-hover:translate-y-0 transition-all hover:bg-main">Add</button>
</div>
