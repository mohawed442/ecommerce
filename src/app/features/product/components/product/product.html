   <div class="my-14 text-center">
        <h2 class="text-3xl font-extrabold text-gray-800"> Main product</h2>
        <div class="mx-auto mt-2 h-1 w-20 rounded-full bg-main"></div>
    </div>


<div class="search-section w-full max-w-4xl mx-auto p-8">
    <div class="relative group">
        <div
            class="absolute -inset-0.5 bg-gradient-to-r from-main to-blue-400 rounded-2xl blur opacity-20 group-focus-within:opacity-50 transition duration-1000">
        </div>

        <div
            class="relative flex flex-col md:flex-row items-center gap-2 bg-white p-2 rounded-2xl border-2 border-main/20 shadow-sm focus-within:border-main transition-all duration-300">

            <div class="relative flex-grow w-full">
                <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                    <svg class="w-5 h-5 text-main" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </div>
                <input type="text" [(ngModel)]="dataSearch"
                    class="block w-full py-3 ps-12 pe-4 text-gray-700 bg-transparent border-none focus:ring-0 outline-none placeholder:text-gray-400"
                    placeholder="Search products...">
            </div>

            <div class="hidden md:block w-px h-8 bg-gray-200"></div>

            <div class="w-full md:w-auto">
                <select [(ngModel)]="selectedOption"
                    class="w-full md:w-44 py-2 px-4 text-sm font-semibold text-gray-600 bg-gray-50 border-none rounded-xl cursor-pointer focus:ring-0 outline-none hover:bg-gray-100 transition-colors">
                    @for (optionName of searchOptionsList; track optionName) {
                    <option [value]="SearchOption[optionName]">
                        By {{ optionName }}
                    </option>
                    }
                </select>
            </div>
        </div>
    </div>
</div>


<section class="py-10 bg-gray-50">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 ">

            @for (product of allProducts| search: dataSearch :selectedOption ; track product._id) {
            <app-card [product]="product"></app-card>
            }
        </div>
    </div>
</section>
