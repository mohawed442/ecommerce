<div class="container mx-auto p-6">
    <div class="mb-10 text-center">
        <h2 class="text-3xl font-extrabold text-gray-800"> Main Categories</h2>
        <div class="mx-auto mt-2 h-1 w-20 rounded-full bg-main"></div>
    </div>

    <div  class="grid grid-cols-1 gap-8 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

        @for (category of catogres; track category._id) {
        <div [routerLink]="['/category',category.slug]"
            class="group relative flex flex-col overflow-hidden rounded-3xl bg-white shadow-sm transition-all duration-500 hover:-translate-y-3 hover:shadow-2xl cursor-pointer border border-gray-100">
            <div class="relative aspect-[4/5] w-full overflow-hidden">
                <img [src]="category.image" [alt]="category.name"
                    class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

                <div
                    class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/80 opacity-60 group-hover:opacity-80 transition-opacity">
                </div>

                <span
                    class="absolute right-4 top-4 rounded-full bg-white/20 backdrop-blur-md px-3 py-1 text-[10px] font-bold uppercase tracking-widest text-white border border-white/30">
                    {{ category.slug }}
                </span>
            </div>

            <div
                class="absolute inset-x-0 bottom-0 p-6 text-white transform translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
                <h3 class="text-2xl font-bold leading-tight">
                    {{ category.name }}
                </h3>

                <div
                    class="flex items-center gap-2 mt-3 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">
                    <span class="h-[2px] w-8 bg-main"></span>
                    <p class="text-xs font-medium text-gray-200">
                        استكشف المنتجات
                    </p>
                </div>

                <p class="mt-4 text-[10px] text-gray-400">
                    آخر تحديث: {{ category.updatedAt | date:'dd/MM/yyyy' }}
                </p>
            </div>
        </div>
        }

    </div>
</div>
