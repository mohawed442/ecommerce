<div class="mx-auto">
  <owl-carousel-o [options]="customOptions">


    <ng-template carouselSlide>
      <ng-content select="[div]"></ng-content>
      <div class="w-full h-[300px] md:h-[570px]  rounded-xl shadow-lg">
        <img src="../../../../images/slider-image-1.jpeg" class="w-full h-full object-cover" alt="Slider 1">
      </div>
    </ng-template>

    <ng-template carouselSlide>
      <div class="w-full h-[300px] md:h-[570px]  rounded-xl shadow-lg">
        <img src="../../../../images/slider-image-2.jpeg" class="w-full h-full object-cover" alt="Slider 2">
      </div>
    </ng-template>

    <ng-template carouselSlide>
      <div class="w-full h-[300px] md:h-[570px]  rounded-xl shadow-lg">
        <img src="../../../../images/slider-image-3.jpeg" class="w-full h-full object-cover" alt="Slider 3">
      </div>
    </ng-template>

  </owl-carousel-o>
</div>
