<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">

    <form [formGroup]="loginAuth" (ngSubmit)="onClick()" class="max-w-sm mx-auto">

        <div class="mb-5">
            <label for="email-alternative" class="block mb-2.5 text-sm font-medium text-heading">Your email</label>
            <input formControlName="email" type="email" id="email-alternative"
                class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow placeholder:text-body"
                placeholder="name@flowbite.com" />
            <validation-massages [controls]="loginAuth.get('email')"></validation-massages>

        </div>

        <div class="mb-5 relative">
            <label for="password-alternative" class="block mb-2.5 text-sm font-medium text-heading">Your
                password</label>
            <input formControlName="password" [type]="showPasswordBoolean ? 'text' : 'password'"
                id="password-alternative"
                class=" bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow placeholder:text-body"
                placeholder="••••••••" />
            <i (click)="showPassword()" [class]="showPasswordBoolean ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"
                class="absolute right-2 top-10 cursor-pointer z-10 text-gray-500">
            </i>
            <validation-massages [controls]="loginAuth.get('password')"></validation-massages>
        </div>

        <button type="submit" [disabled]="loginAuth.invalid"
            class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none disabled:opacity-50">
            Submit
        </button>
        <p class="text-red-500">{{apiError}}</p>
    </form>
</div>
